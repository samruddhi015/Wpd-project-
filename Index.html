<!DOCTYPE html>
<html>
<head>
    <title>My App Website</title>

    <!-- CSS -->
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #007BFF;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        nav a:hover {
            color: yellow;
        }

        section {
            padding: 20px;
        }

        .box {
            background-color: white;
            padding: 15px;
            margin: 10px;
            border-radius: 5px;
        }

        footer {
            background-color: black;
            color: white;
            text-align: center;
            padding: 10px;
        }

        img {
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>My App</h1>
        <p>Simple Website for My Application</p>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Features</a>
        <a href="#">Contact</a>
    </nav>

    <!-- About -->
    <section>
        <div class="box">
            <h2>About App</h2>
            <p>This app helps users to complete tasks easily and quickly.</p>
        </div>

        <!-- Features -->
        <div class="box">
            <h2>Features</h2>
            <ul>
                <li>Easy to use</li>
                <li>Fast performance</li>
                <li>User friendly</li>
            </ul>
        </div>

        <!-- Image -->
        <div class="box">
            <h2>App Preview</h2>
            <img src="app.jpg" width="200">
        </div>

        <!-- Contact -->
        <div class="box">
            <h2>Contact</h2>
            <p>Email: myapp@gmail.com</p>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 My App Website</p>
    </footer>

</body>
</html>
